name: Update RetroAchievements JSON

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run update script
        env:
          RA_USERNAME: ${{ secrets.RA_USERNAME }}
          RA_SECRET_KEY: ${{ secrets.RA_SECRET_KEY }}
        run: node update.js

      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add retroachivos.json
          git commit -m "Update RetroAchievements stats" || exit 0
          git push